name: doff_remote
description: A Smart Remote controller for STB Reciever.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  webview_flutter: ^4.7.0
  material_design_icons_flutter: ^7.0.7296
  youtube_explode_dart: ^2.2.2
  network_info_plus: ^6.0.0 # Helpful for getting the local IP easily
  shared_preferences: ^2.2.2
  # OPTIONAL: To play the extracted video URLs inside your app
  video_player: ^2.8.1
  chewie: ^1.7.1
  url_launcher: ^6.3.1
  flutter_inappwebview: ^6.0.0

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/apps.json
    - assets/app_icon.png

